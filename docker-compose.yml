services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tracer
      POSTGRES_USER: tracer
      POSTGRES_PASSWORD: tracer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracer -d tracer"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  collector:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn collector.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tracer:tracer@postgres:5432/tracer
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m collector.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tracer:tracer@postgres:5432/tracer
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
